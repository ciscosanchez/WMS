name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma clients
        run: npm run db:generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings=100

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx}" "tests/**/*.ts"

      - name: Unit tests
        run: npx jest --passWithNoTests --ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/apps/wms
            git pull origin main
            cd /root/apps/wms/infra
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans wms
