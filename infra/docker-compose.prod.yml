services:
  # ── Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - "--log.level=WARN"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ramola"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=cisco@ramola.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - ramola
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ramola}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ramola}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ramola
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ramola}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - ramola
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WMS ────────────────────────────────────────────────────
  wms:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${WMS_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: https://wms.ramola.app
      USE_MOCK_AUTH: "false"
      USE_MOCK_DATA: "false"
      TENANT_RESOLUTION: header
      DEFAULT_TENANT_SLUG: armstrong
      DOCAI_URL: http://docai:3002
      DOCAI_API_KEY: ${DOCAI_API_KEY}
      S3_ENDPOINT: minio
      S3_PORT: "9000"
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: armstrong-wms
      S3_PUBLIC_URL: https://storage.wms.ramola.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wms.rule=Host(`wms.ramola.app`)"
      - "traefik.http.routers.wms.entrypoints=websecure"
      - "traefik.http.routers.wms.tls.certresolver=letsencrypt"
      - "traefik.http.services.wms.loadbalancer.server.port=3000"
    networks:
      - ramola
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://storage.wms.ramola.app
    volumes:
      - miniodata:/data
    networks:
      - ramola
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`storage.wms.ramola.app`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DocAI ──────────────────────────────────────────────────
  docai:
    build:
      context: ../../docai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CORS_ORIGIN: https://wms.ramola.app
      DOCAI_API_KEY: ${DOCAI_API_KEY}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ramola
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/api/v1/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Not exposed via Traefik — internal only (WMS calls it directly)

  # ── DispatchPro ────────────────────────────────────────────
  dispatch:
    build:
      context: ../../dispatch-pro
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DISPATCH_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WMS_API_URL: http://wms:3000
      WMS_API_KEY: ${WMS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatch.rule=Host(`dispatch.ramola.app`)"
      - "traefik.http.routers.dispatch.entrypoints=websecure"
      - "traefik.http.routers.dispatch.tls.certresolver=letsencrypt"
      - "traefik.http.services.dispatch.loadbalancer.server.port=3001"
    networks:
      - ramola
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ramola:
    name: ramola

volumes:
  pgdata:
  redisdata:
  miniodata:
  letsencrypt:
