services:
  # ── Socket Proxy (limits Docker API exposure to Traefik) ───
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  # ── Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:v2.11@sha256:2a2460731a47e9406dfdee0c52734b9b86509fe7e82e96ce06e91a49b83b1c71
    restart: unless-stopped
    command:
      - "--log.level=WARN"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ramola"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=cisco@ramola.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
    networks:
      - ramola
      - socket-proxy
    depends_on:
      - socket-proxy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Security headers middleware
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      # Rate limiting middleware
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=200"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1s"

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ramola}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ramola}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ramola}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    restart: unless-stopped
    command: redis-server --maxmemory 96mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WMS ────────────────────────────────────────────────────
  wms:
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${WMS_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: https://wms.ramola.app
      AUTH_TRUST_HOST: "true"
      USE_MOCK_AUTH: "false"
      USE_MOCK_DATA: "false"
      TENANT_RESOLUTION: subdomain
      DISABLE_EMBEDDED_WORKERS: "true"
      DOCAI_URL: http://docai:3002
      DOCAI_API_KEY: ${DOCAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ARMSTRONG_TENANT_SLUG: armstrong
      CRON_SECRET: ${CRON_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      SHOPIFY_API_VERSION: "2026-01"
      SHOPIFY_LOCATION_ID: ${SHOPIFY_LOCATION_ID:-}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET:-}
      SHOPIFY_WMS_CLIENT_CODE: ${SHOPIFY_WMS_CLIENT_CODE:-Armstrong}
      S3_ENDPOINT: minio
      S3_PORT: "9000"
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PUBLIC_URL: https://storage.wms.ramola.app
      WMS_API_KEY: ${WMS_API_KEY:-}
      DISPATCH_PRO_URL: http://dispatch:3001
      DISPATCH_PRO_API_KEY: ${WMS_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Multi-tenant: accept tenant subdomains AND wms.ramola.app (login/admin)
      # Each hostname gets its own cert via HTTP-01 (wildcard requires DNS challenge)
      - "traefik.http.routers.wms.rule=Host(`wms.ramola.app`) || Host(`armstrong.wms.ramola.app`)"
      - "traefik.http.routers.wms.entrypoints=websecure"
      - "traefik.http.routers.wms.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wms.tls.domains[0].main=wms.ramola.app"
      - "traefik.http.routers.wms.tls.domains[1].main=armstrong.wms.ramola.app"
      - "traefik.http.services.wms.loadbalancer.server.port=3000"
      - "traefik.http.routers.wms.middlewares=security-headers@docker,rate-limit@docker"
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Background Workers (BullMQ) ────────────────────────────
  # Runs the same image as WMS but only starts the BullMQ workers,
  # not the Next.js web server. Isolates job processing from request handling.
  worker:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${WMS_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      SHOPIFY_API_VERSION: "2026-01"
      SHOPIFY_LOCATION_ID: ${SHOPIFY_LOCATION_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://storage.wms.ramola.app
      MINIO_API_CORS_ALLOW_ORIGIN: "https://wms.ramola.app,https://*.wms.ramola.app"
    volumes:
      - miniodata:/data
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`storage.wms.ramola.app`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DocAI ──────────────────────────────────────────────────
  docai:
    build:
      context: ../../docai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CORS_ORIGIN: https://wms.ramola.app
      DOCAI_API_KEY: ${DOCAI_API_KEY}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/api/v1/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── DispatchPro ────────────────────────────────────────────
  dispatch:
    build:
      context: ../../dispatch-pro
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DISPATCH_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WMS_API_URL: http://wms:3000
      WMS_API_KEY: ${WMS_API_KEY:-}
      SAMSARA_API_TOKEN: ${SAMSARA_API_TOKEN:-}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatch.rule=Host(`dispatch.ramola.app`)"
      - "traefik.http.routers.dispatch.entrypoints=websecure"
      - "traefik.http.routers.dispatch.tls.certresolver=letsencrypt"
      - "traefik.http.services.dispatch.loadbalancer.server.port=3001"
      - "traefik.http.routers.dispatch.middlewares=security-headers@docker,rate-limit@docker"
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Cron Runner ────────────────────────────────────────────
  # Alpine container running crond to call WMS cron endpoints.
  # Uses wget to avoid needing curl in Alpine base image.
  cron:
    image: alpine:3.19@sha256:c5b1261d6d3e43071626931fc004f70149baeba2c8ec672bd4f27761f8e1ad6b
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      WMS_INTERNAL_URL: http://wms:3000
    command: >
      sh -c "
        echo '*/15 * * * * wget -qO- --header=\"x-cron-secret: $${CRON_SECRET}\" $${WMS_INTERNAL_URL}/api/cron/shopify-sync >> /var/log/cron.log 2>&1' > /etc/crontabs/root &&
        echo '0 2 * * * wget -qO- --header=\"x-cron-secret: $${CRON_SECRET}\" $${WMS_INTERNAL_URL}/api/cron/storage-billing >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
        echo '0 * * * * wget -qO- --header=\"x-cron-secret: $${CRON_SECRET}\" $${WMS_INTERNAL_URL}/api/cron/tracking-update >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
        echo '0 3 * * * wget -qO- --header=\"x-cron-secret: $${CRON_SECRET}\" $${WMS_INTERNAL_URL}/api/cron/netsuite-sync >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
        crond -f -L /var/log/cron.log
      "
    depends_on:
      wms:
        condition: service_healthy
    networks:
      - ramola
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 16M

networks:
  ramola:
    name: ramola
  socket-proxy:
    internal: true

volumes:
  pgdata:
  redisdata:
  miniodata:
  letsencrypt:
