# NOTE: This static config is superseded by the inline `command:` args in
# infra/docker-compose.prod.yml, which configure wildcard TLS via Cloudflare
# DNS challenge. This file is kept for reference only — changes here have no
# effect unless the docker-compose command args are removed.

api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      email: cisco@ramola.app
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 30

providers:
  docker:
    exposedByDefault: false
    network: ramola
